{% extends "base.html" %}

{% block title %}
Add Assignment
{% endblock %}

{% block content %}
<h2>Add Assignment</h2>
<form method="POST">

    <label>Course</label>
    <input
        type="text"
        name="course"
        class="form-control">
    <b>

    <label>Assignment</label>
    <input
        type="text"
        name="title"
        class="form-control">
    <br>
    <label>Due Date</label>
    <input
        type="date"
        name="due_date"
        class="form-control">
    <br>

    <button
        type="submit"
        class="btn btn-primary">
        Save Assignment
    </button>

    <a href="javascript:history.back()" class="btn btn-secondary">
        ← Back
    </a>
</form>

{% endblock %}
